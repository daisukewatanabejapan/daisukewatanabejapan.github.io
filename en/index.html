<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daisuke Watanabe | Engineering &amp; AI Leadership</title>
    <script>
      fetch('/index.html?v=20260720b', { cache: 'no-store' })
        .then((response) => response.text())
        .then((html) => {
          const parsed = new DOMParser().parseFromString(html, 'text/html');
          parsed.querySelector('script[src*="script.js"]')?.remove();
          document.documentElement.innerHTML = parsed.documentElement.innerHTML;
          document.documentElement.lang = 'en';
          document.documentElement.dataset.language = 'en';

          const translations = document.createElement('script');
          translations.src = '/script.js?v=20260720d';
          document.body.appendChild(translations);
        });
    </script>
  </head>
  <body></body>
</html>
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daisuke Watanabe | Engineering &amp; AI Leadership</title>
    <script>
      fetch('/index.html?v=20260720b', { cache: 'no-store' })
        .then((response) => response.text())
        .then((html) => {
          const english = html
            .replace('<html lang="ja">', '<html lang="en" data-language="en">')
            .replace(/\s*<script src="\.\/script\.js[^\"]*" defer><\/script>/, '');
          document.open();
          document.write(english);
          document.close();

          const translations = document.createElement('script');
          translations.src = '/script.js?v=20260720c';
          document.body.appendChild(translations);
        });
    </script>
  </head>
  <body></body>
</html>
