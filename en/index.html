<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daisuke Watanabe | Engineering &amp; AI Leadership</title>
    <script>
      fetch('/index.html?v=20260721l', { cache: 'no-store' })
        .then((response) => response.text())
        .then((html) => {
          const parsed = new DOMParser().parseFromString(html, 'text/html');
          parsed.querySelector('script[src*="script.js"]')?.remove();
          const portrait = parsed.querySelector('.portrait img');
          if (portrait) portrait.src = 'https://daisukewatanabejapan.github.io/watanabe.jpg';
          const aboutVisual = parsed.querySelector('.about-hero-visual img');
          if (aboutVisual) aboutVisual.src = 'https://daisukewatanabejapan.github.io/scrum-alliance-csat-daisuke-watanabe.jpeg';
          const base = parsed.createElement('base');
          base.href = '/';
          parsed.head.prepend(base);
          document.documentElement.innerHTML = parsed.documentElement.innerHTML;
          document.documentElement.lang = 'en';
          document.documentElement.dataset.language = 'en';

          const translations = document.createElement('script');
          translations.src = '/script.js?v=20260721l';
          document.body.appendChild(translations);
        });
    </script>
  </head>
  <body></body>
</html>
