<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daisuke Watanabe | Engineering &amp; AI Leadership</title>
    <script>
      fetch('/index.html?v=20260720av', { cache: 'no-store' })
        .then((response) => response.text())
        .then((html) => {
          const parsed = new DOMParser().parseFromString(html, 'text/html');
          parsed.querySelector('script[src*="script.js"]')?.remove();
          document.documentElement.innerHTML = parsed.documentElement.innerHTML;
          document.documentElement.lang = 'en';
          document.documentElement.dataset.language = 'en';

          const translations = document.createElement('script');
          translations.src = '/script.js?v=20260720av';
          translations.addEventListener('load', () => {
            if (!location.hash) return;
            const restoreHashPosition = () => {
              const target = document.querySelector(location.hash);
              if (target) window.scrollTo({ top: target.offsetTop - 72, behavior: 'auto' });
            };
            requestAnimationFrame(restoreHashPosition);
            document.fonts?.ready.then(restoreHashPosition);
            const portrait = document.querySelector('.portrait img');
            if (portrait && !portrait.complete) portrait.addEventListener('load', restoreHashPosition, { once: true });
            setTimeout(restoreHashPosition, 700);
          });
          document.body.appendChild(translations);
        });
    </script>
  </head>
  <body></body>
</html>
